[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.intl", "php82Extensions.curl", "php82Extensions.fileinfo", "libzip", "composer"]

[phases.install]
cmds = [
    "echo 'extension=zip' >> $(php -r 'echo php_ini_loaded_file();') || true",
    "GD_SO=$(find /nix/store -name 'gd.so' 2>/dev/null | head -1); [ -n \"$GD_SO\" ] && echo \"extension=$GD_SO\" >> $(php -r 'echo php_ini_loaded_file();') && echo \"GD cargado: $GD_SO\" || echo 'GD no encontrado'",
    "composer install --no-dev --optimize-autoloader --ignore-platform-reqs"
]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan storage:link"
]

[start]
cmd = "mkdir -p storage/fonts && php artisan migrate --force && php artisan db:seed --class=RolesPermisosSeeder --force && php artisan db:seed --class=CatalogoProductosSeeder --force && php artisan serve --host 0.0.0.0 --port $PORT"
